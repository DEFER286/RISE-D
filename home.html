<!-- Koodii JavaScript Menu Hojjechiisuuf -->
<script>
    const menuBtn = document.getElementById('menu-btn');
    const sideMenu = document.getElementById('side-menu');
    menuBtn.addEventListener('click', () => {
        sideMenu.style.display = sideMenu.style.display === 'none' ? 'block' : 'none';
    });

    const homeBtn = document.getElementById('home-dropdown-btn');
    const homeSubMenu = document.getElementById('home-sub-menu');
    homeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (homeSubMenu.style.display === 'none') {
            homeSubMenu.style.display = 'block';
            homeBtn.innerHTML = 'Home ▲';
        } else {
            homeSubMenu.style.display = 'none';
            homeBtn.innerHTML = 'Home ▼';
        }
    });
</script>
    <script>
// 1. Motivation haaraa 2 CMS irraa fiduuf
fetch('data/motivation.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('latest-motivation');
    const latest = data.items.slice(0, 2); // Isa dhuma maxxanfame 2 qofa fudhata
    latest.forEach(item => {
      container.innerHTML += `
        <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; margin-bottom: 15px; border-left: 4px solid #FF9800; border-radius: 8px;">
          <h3 style="color: #fff; margin-top: 0; font-size: 18px;">${item.title}</h3>
          <p style="color: #ddd; font-size: 14px;">${item.body.substring(0, 100)}...</p>
        </div>
      `;
    });
  }).catch(err => console.log('Motivation hin argamne:', err));

// 2. Seenaawwan haaraa 2 CMS irraa fiduuf
fetch('data/stories.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('latest-stories');
    const latest = data.items.slice(0, 2); // Isa dhuma maxxanfame 2 qofa fudhata

      container.innerHTML += `

          <h3 style="color: #fff; margin-top: 0; font-size: 18px;">${item.title}</h3>
          <p style="color: #ddd; font-size: 14px;">${item.body.substring(0, 100)}...</p>
        </div>
      `;
    });
  }).catch(err => console.log('Seenaan hin argamne:', err));
</script>
