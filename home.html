    <script>
        const menuBtn = document.getElementById('menu-btn');
        const sideMenu = document.getElementById('side-menu');
        const closeBtn = document.getElementById('close-btn');

        if (menuBtn && sideMenu) {
            menuBtn.addEventListener('click', () => { sideMenu.style.display = 'block'; });
        }
        if (closeBtn && sideMenu) {
            closeBtn.addEventListener('click', () => { sideMenu.style.display = 'none'; });
        }

        const homeBtn = document.getElementById('home-dropdown-btn');
        const homeSubMenu = document.getElementById('home-sub-menu');
        if (homeBtn && homeSubMenu) {
            homeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                homeSubMenu.style.display = homeSubMenu.style.display === 'none' ? 'block' : 'none';
                homeBtn.innerHTML = homeSubMenu.style.display === 'block' ? 'Home ▲' : 'Home ▼';
            });
        }

     
        // All posts store
        let allPosts = [];

        function buildMiniCard(item, cat) {
            const raw = item.description || item.body || '';
            const plain = raw
                .replace(/<[^>]*>/g, ' ')
                .replace(/#{1,6}\s*/g, '')
                .replace(/\*{1,2}([^*]*)\*{1,2}/g, '$1')
                .replace(/[-•*]\s+/g, ' ')
                .replace(/\\n/g, ' ')
                .replace(/\n/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            const plainDesc = plain.substring(0, 80) + (plain.length > 80 ? '...' : '');
            const emoji = cat === 'motivation' ? '🔥' : cat === 'stories' ? '📚' : '🎓';
            const imgHTML = item.image
                ? `<img src="${item.image}" class="mini-card-img" alt="${item.title}" loading="lazy" width="400" height="130" decoding="async" onerror="this.className='mini-card-placeholder';this.outerHTML='<div class=mini-card-placeholder>${emoji}</div>'">`
                : `<div class="mini-card-placeholder">${emoji}</div>`;
            const badgeClass = cat === 'motivation' ? 'badge-motivation' : cat === 'stories' ? 'badge-stories' : 'badge-education';
            const badgeLabel = cat === 'motivation' ? '🔥 Motivation' : cat === 'stories' ? '📚 Seenaa' : '🎓 Gorsa';
            const linkColor = cat === 'motivation' ? '#FF9800' : cat === 'stories' ? '#00BCD4' : '#8BC34A';
            return `
                <a href="/${cat}/${item.slug}" class="mini-card" data-cat="${cat}">
                    ${imgHTML}
                    <div class="mini-card-body">
                        <span class="cat-badge ${badgeClass}">${badgeLabel}</span>
                        <h3 class="mini-card-title">${item.title}</h3>
                        <p class="mini-card-desc">${plainDesc}</p>
                        <span class="mini-card-link" style="color:${linkColor};">Dubbisi ➔</span>
                    </div>
                </a>`;
        }

        function renderGrid(filter) {
            const grid = document.getElementById('unified-grid');
            const filtered = filter === 'all' ? allPosts : allPosts.filter(p => p.cat === filter);
            grid.innerHTML = filtered.map(p => buildMiniCard(p.item, p.cat)).join('');
        }

        // Category tabs
        document.querySelectorAll('.cat-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderGrid(tab.dataset.cat);
            });
        });
        // Fetch all 3 categories and merge
        let loaded = 0;
        function tryRender() {
            loaded++;
            if (loaded === 3) {
                // 1. Sa'aatii fi guyyaa ammaa (Ethiopian Time) fudhadhu
                const now = new Date();

                // 2. Barreeffamoota keessaa kanneen sa'aatiin isaanii gahe qofa calali (Filter)
                allPosts = allPosts.filter(p => {
                    // CMS kee irratti dirreen guyyaa 'item.date' ykn 'item.Guyyaa' yoo ta'e dubbisa
                    const postDate = new Date(p.item.date || p.item.Guyyaa || 0);
                    return postDate <= now;
                });

                // 3. Erga calalamee booda bifa dhaan wal duraa duubaan (Date) hiriirsi
                allPosts.sort((a, b) => {
                    const dateA = new Date(a.item.date || a.item.Guyyaa || 0);
                    const dateB = new Date(b.item.date || b.item.Guyyaa || 0);
                    return dateB - dateA;
                });

                renderGrid('all');
            }
        }
