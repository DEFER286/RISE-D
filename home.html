    <script>
        // === INITIAL THEME CONFIGURATION ===
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const body = document.body;
            const toggleBtn = document.getElementById('theme-toggle-btn');
            const menuSvg = document.getElementById('menu-svg-icon');

            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
                if (toggleBtn) {
                    toggleBtn.innerText = "🌙 Dark Mode";
                    toggleBtn.style.background = "#222222";
                    toggleBtn.style.color = "#ffffff";
                }
                if (menuSvg) menuSvg.style.stroke = "#ffffff";
            } else {
                body.classList.remove('dark-mode');
                if (toggleBtn) {
                    toggleBtn.innerText = "☀️ Light Mode";
                    toggleBtn.style.background = "#ffffff";
                    toggleBtn.style.color = "#000000";
                }
                if (menuSvg) menuSvg.style.stroke = "#000000";
            }
        }

        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
            initTheme();
        }

        // Run immediately to avoid page flashes
        initTheme();

        // === SIDE MENU CONTROLS ===
        const menuBtn = document.getElementById('menu-btn');
        const sideMenu = document.getElementById('side-menu');
        const closeBtn = document.getElementById('close-btn');

        if (menuBtn && sideMenu) menuBtn.addEventListener('click', () => { sideMenu.style.display = 'block'; });
        if (closeBtn && sideMenu) closeBtn.addEventListener('click', () => { sideMenu.style.display = 'none'; });

        let allPosts = [];

        function buildMiniCard(item, cat) {
            const raw = item.description || item.body || '';
            const plain = raw.replace(/<[^>]*>/g, ' ').replace(/#{1,6}\s*/g, '').replace(/\*{1,2}([^*]*)\*{1,2}/g, '$1').replace(/\s+/g, ' ').trim();
            const plainDesc = plain.substring(0, 75) + (plain.length > 75 ? '...' : '');
            const emoji = cat === 'motivation' ? '🔥' : cat === 'stories' ? '📚' : '🎓';
            
            const imgHTML = item.image
                ? `<img src="${item.image}" class="mini-card-img" alt="${item.title}" loading="lazy" decoding="async" onerror="this.className='mini-card-placeholder';this.outerHTML='<div class=mini-card-placeholder>${emoji}</div>'">`
                : `<div class="mini-card-placeholder">${emoji}</div>`;
                
            const badgeLabel = cat === 'motivation' ? '🔥 Motivation' : cat === 'stories' ? '📚 Seenaa' : '🎓 Gorsa';
            
            return `
                <a href="/${cat}/${item.slug}" class="mini-card" data-cat="${cat}">
                    ${imgHTML}
                    <div class="mini-card-body">
                        <div>
                            <span class="cat-badge">${badgeLabel}</span>
                            <h3 class="mini-card-title">${item.title}</h3>
                            <p class="mini-card-desc">${plainDesc}</p>
                        </div>
                        <span class="mini-card-link">Dubbisi ➔</span>
                    </div>
                </a>`;
        }

        function renderGrid() {
            const grid = document.getElementById('unified-grid');
            grid.innerHTML = allPosts.map(p => buildMiniCard(p.item, p.cat)).join('');
        }

        let loaded = 0;
        function tryRender() {
            loaded++;
            if (loaded === 3) {
                const now = new Date();
                allPosts = allPosts.filter(p => {
                    const postDate = new Date(p.item.date || p.item.Guyyaa || 0);
                    return postDate <= now;
                });
                allPosts.sort((a, b) => new Date(b.item.date || b.item.Guyyaa || 0) - new Date(a.item.date || a.item.Guyyaa || 0));
                renderGrid();
            }
        }

        const paths = [
            { cat: 'motivation', url: '/data/motivation.json' },
            { cat: 'stories', url: '/data/stories.json' },
            { cat: 'education', url: '/data/education.json' }
        ];

        paths.forEach(p => {
            fetch(p.url).then(r => r.json()).then(data => {
                if (data.items) data.items.forEach((item, i) => allPosts.push({ cat: p.cat, item, idx: i }));
                tryRender();
            }).catch(() => tryRender());
        });

        function searchDashboard() {
            const input = document.getElementById('side-search-input')?.value.toLowerCase() || '';
            document.querySelectorAll('.mini-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(input) ? '' : 'none';
            });
        }

        // Event listener ensuring icons adjust even after initial dynamic load finishes
        window.addEventListener('DOMContentLoaded', initTheme);
    </script>
