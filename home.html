        /* === MINI CARD (Light Mode) === */

    <div class="hero">

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const sideMenu = document.getElementById('side-menu');
        const closeBtn = document.getElementById('close-btn');
        const themeToggleBtn = document.getElementById('theme-toggle');

        // Menu triggers
        if (menuBtn && sideMenu) menuBtn.addEventListener('click', () => { sideMenu.style.display = 'block'; });
        if (closeBtn && sideMenu) closeBtn.addEventListener('click', () => { sideMenu.style.display = 'none'; });

        // === JAVASCRIPT FOR DARK/LIGHT MODE SYSTEM ===
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
            if(themeToggleBtn) themeToggleBtn.innerHTML = "☀️ Light Mode";
        } else {
            if(themeToggleBtn) themeToggleBtn.innerHTML = "🌙 Dark Mode";
        }

        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                let theme = 'light';
                if (document.body.classList.contains('dark-mode')) {
                    theme = 'dark';
                    themeToggleBtn.innerHTML = "☀️ Light Mode";
                } else {
                    themeToggleBtn.innerHTML = "🌙 Dark Mode";
                }
                localStorage.setItem('theme', theme);
            });
        }

        let allPosts = [];

        function buildMiniCard(item, cat) {
            const raw = item.description || item.body || '';
            const plain = raw.replace(/<[^>]*>/g, ' ').replace(/#{1,6}\s*/g, '').replace(/\*{1,2}([^*]*)\*{1,2}/g, '$1').replace(/\s+/g, ' ').trim();
            const plainDesc = plain.substring(0, 75) + (plain.length > 75 ? '...' : '');
            const emoji = cat === 'motivation' ? '🔥' : cat === 'stories' ? '📚' : '🎓';
            
            const imgHTML = item.image
                ? `<img src="${item.image}" class="mini-card-img" alt="${item.title}" loading="lazy" decoding="async" onerror="this.className='mini-card-placeholder';this.outerHTML='<div class=mini-card-placeholder>${emoji}</div>'">`
                : `<div class="mini-card-placeholder">${emoji}</div>`;
                
            const badgeClass = cat === 'motivation' ? 'badge-motivation' : cat === 'stories' ? 'badge-stories' : 'badge-education';
            const badgeLabel = cat === 'motivation' ? '🔥 Motivation' : cat === 'stories' ? '📚 Seenaa' : '🎓 Gorsa';
            
            // Bifa linkii akra itti madaquuf (Light fi Dark gidduutti bifa gaarii qabaatu)
            const linkColor = cat === 'motivation' ? '#ff9800' : cat === 'stories' ? '#00bcd4' : '#8bc34a';
            
            return `
                <a href="/${cat}/${item.slug}" class="mini-card" data-cat="${cat}">
                    ${imgHTML}
                    <div class="mini-card-body">
                        <div>
                            <span class="cat-badge ${badgeClass}">${badgeLabel}</span>
                            <h3 class="mini-card-title">${item.title}</h3>
                            <p class="mini-card-desc">${plainDesc}</p>
                        </div>
                        <span class="mini-card-link" style="color:${linkColor};">Dubbisi ➔</span>
                    </div>
                </a>`;
        }

        function renderGrid() {
            const grid = document.getElementById('unified-grid');
            grid.innerHTML = allPosts.map(p => buildMiniCard(p.item, p.cat)).join('');
        }

        let loaded = 0;
        function tryRender() {
            loaded++;
            if (loaded === 3) {
                const now = new Date();
                allPosts = allPosts.filter(p => {
                    const postDate = new Date(p.item.date || p.item.Guyyaa || 0);
                    return postDate <= now;
                });
                allPosts.sort((a, b) => new Date(b.item.date || b.item.Guyyaa || 0) - new Date(a.item.date || a.item.Guyyaa || 0));
                renderGrid();
            }
        }

        const paths = [
            { cat: 'motivation', url: '/data/motivation.json' },
            { cat: 'stories', url: '/data/stories.json' },
            { cat: 'education', url: '/data/education.json' }
        ];

        paths.forEach(p => {
            fetch(p.url).then(r => r.json()).then(data => {
                if (data.items) data.items.forEach((item, i) => allPosts.push({ cat: p.cat, item, idx: i }));
                tryRender();
            }).catch(() => tryRender());
        });

        function searchDashboard() {
            const input = document.getElementById('side-search-input')?.value.toLowerCase() || '';
            document.querySelectorAll('.mini-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(input) ? '' : 'none';
            });
        }
    </script>

    <div class="subscribe-card">
        <div class="subscribe-card-content">

            <form action="https://formspree.io/f/xbdbaolp" method="POST" class="email-input-group" style="width:100%;">
                <input type="email" name="email" class="email-input-pill" placeholder="email..." required>
                <button class="email-subscribe-button" type="submit">Subscribe</button>
            </form>

</body>
