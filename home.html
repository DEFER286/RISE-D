<!-- Koodii JavaScript Menu Hojjechiisuuf -->
<script>
    const menuBtn = document.getElementById('menu-btn');
    const sideMenu = document.getElementById('side-menu');
    menuBtn.addEventListener('click', () => {
        sideMenu.style.display = sideMenu.style.display === 'none' ? 'block' : 'none';
    });

    const homeBtn = document.getElementById('home-dropdown-btn');
    const homeSubMenu = document.getElementById('home-sub-menu');
    homeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (homeSubMenu.style.display === 'none') {
            homeSubMenu.style.display = 'block';
            homeBtn.innerHTML = 'Home ▲';
        } else {
            homeSubMenu.style.display = 'none';
            homeBtn.innerHTML = 'Home ▼';
        }
    });

    
                        // 1. Motivation hunda saanduqa sarara muraasaan Dashboard irratti fiduuf (Suuraa Ala)
        fetch('data/motivation.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('latest-motivation');
                container.innerHTML = ''; 
                
                // Isa haaraa dursa gubbaatti kaayna
                const allItems = data.items.reverse();
                allItems.forEach(item => {
    container.innerHTML += `
        <a href="motivation.html#${item.title.split(' ')[0]}" style="text-decoration: none; color: inherit;">
            <div style="background-color: #1F1A3A; padding: 25px 20px; border-radius: 12px; border-left: 6px solid #FF9800; margin-bottom: 25px; text-align: left; transition: all 0.3s ease;">
                <h3 style="color: #fff; margin-top: 0; font-size: 18px;">${item.title}</h3>
                <p style="color: #ddd; font-size: 14px; margin-bottom: 10px; line-height: 1.5;">${item.description || (item.body ? item.body.substring(0, 100) + '...' : '')}</p>
                <span style="color: #FF9800; font-size: 14px; font-weight: bold; display: inline-block;">Guutuu Dubbisi →</span>
            </div>
        </a>
    `;
});
        
                
            }).catch(err => console.log('Motivation hin argamne:', err));



        // 2. Seenaawwan hunda saanduqa sarara muraasaan Dashboard irratti fiduuf (Suuraa Ala)
        fetch('data/stories.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('latest-stories');
                container.innerHTML = ''; 
                
                // Isa haaraa dursa gubbaatti kaayna
                const allItems = data.items.reverse();
                
                allItems.forEach(item => {
    container.innerHTML += `
        <a href="stories.html#${item.title.split(' ')[0]}" style="text-decoration: none; color: inherit;">
            <div style="background-color: #1F1A3A; padding: 25px 20px; border-radius: 12px; border-left: 6px solid #FF9800; margin-bottom: 25px; text-align: left; transition: all 0.3s ease;">
                <h3 style="color: #fff; margin-top: 0; font-size: 18px;">${item.title}</h3>
                <p style="color: #ddd; font-size: 14px; margin-bottom: 10px; line-height: 1.5;">${item.body ? item.body.substring(0, 100) + '...' : ''}</p>
                <span style="color: #FF9800; font-size: 14px; font-weight: bold; display: inline-block;">Guutuu Dubbisi →</span>
            </div>
        </a>
    `;
});
        
            }).catch(err => console.log('Seenaan hin argamne:', err));
                // 3. Gorsa Barnoota hunda saanduqa sarara muraasaan Dashboard irratti fiduuf
        fetch('data/education.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('education-container');
                container.innerHTML = '';

                if(data.items && data.items.length > 0) {
                    const allItems = data.items.reverse();
                    allItems.forEach(item => {
    const itemID = item.title.replace(/\s+/g, '-').toLowerCase();
    container.innerHTML += `
        <a href="education.html#${itemID}" style="text-decoration: none; color: inherit;">
            <div style="background-color: #1F1A3A; padding: 25px 20px; border-radius: 12px; border-left: 6px solid #FF9800; margin-bottom: 25px; text-align: left; transition: all 0.3s ease;">
                <h3 style="color: #fff; margin-top: 0; font-size: 18px;">${item.title}</h3>
                <p style="color: #ddd; font-size: 14px; margin-bottom: 10px; line-height: 1.5;">${item.description || (item.body ? item.body.substring(0, 100) + '...' : '')}</p>
                <span style="color: #FF9800; font-size: 14px; font-weight: bold; display: inline-block;">Guutuu Dubbisi →</span>
            </div>
        </a>
    `;
});
                                                          
                } else {
                    container.innerHTML = '<p style="color: #aaa; text-align: center;">Ammaaf barruun gorsa barnootaa hin jiru.</p>';
                }
            })
            .catch(err => console.log('Gorsi Barnootaa hin argamne:', err));



             // Hojii Search Bar: Saanduqa hundaa qoratee kan barbaadame qofa hambisa
        function searchDashboard() {
            const input = document.getElementById('dashboard-search').value.toLowerCase();
            
            // Saanduqa Motivation hunda qorachuuf
            const motivationContainer = document.getElementById('latest-motivation');
            const motivationBoxes = motivationContainer.getElementsByTagName('a');
            
            for (let i = 0; i < motivationBoxes.length; i++) {
                let text = motivationBoxes[i].textContent || motivationBoxes[i].innerText;
                if (text.toLowerCase().indexOf(input) > -1) {
                    motivationBoxes[i].style.display = "";
                } else {
                    motivationBoxes[i].style.display = "none";
                }
            }
            
            // Saanduqa Stories hunda qorachuuf
            const storiesContainer = document.getElementById('latest-stories');
            const storiesBoxes = storiesContainer.getElementsByTagName('a');
            
            for (let i = 0; i < storiesBoxes.length; i++) {
                let text = storiesBoxes[i].textContent || storiesBoxes[i].innerText;
                if (text.toLowerCase().indexOf(input) > -1) {
                    storiesBoxes[i].style.display = "";
                } else {
                    storiesBoxes[i].style.display = "none";
                }
            }
        }
       
</script>
