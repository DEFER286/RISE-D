<!DOCTYPE html>
<html lang="om">
<head>
    <meta name="robots" content="index, follow" />
    <meta name="robots" content="max-image-preview:large">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiseToday - Barruu Guutuu</title>

    <meta property="og:type" content="article" />
    <meta id="meta-og-title" property="og:title" content="RiseToday - Barruulee Onnachiisoo" />
    <meta id="meta-og-desc" property="og:description" content="Barruulee, seenaawwan fi gorsa adda addaa dubbisaa." />
    <meta id="meta-og-image" property="og:image" content="https://risetoday.vercel.app/images/og-image.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="telegram:channel" content="@imala_kaayoo">

    <style>
        body { background-color: #000000; color: white; font-family: Arial, sans-serif; padding: 20px; }
        .post-container { max-width: 800px; margin: auto; position: relative; padding-top: 40px; }
        .close-btn { position: absolute; top: 0px; right: 5px; font-size: 35px; color: #ffffff; text-decoration: none; font-weight: bold; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: #cccccc; }
        h1 { color: #ffffff; }
        .date { color: #ddd; font-size: 14px; }
        .author-section { display:flex; align-items:center; gap:10px; margin-bottom:1rem; }
        .author-photo { width:40px; height:40px; border-radius:50%; object-fit:cover; object-position:top; border:2px solid #ffffff; flex-shrink:0; }
        @media (max-width: 600px) { .author-photo { width:35px; height:35px; } .date { font-size:12px; } }
        .content { font-size: 18px; line-height: 1.6; margin-top: 20px; }
        img:not(.author-photo) { display: block; max-width: 100%; height: auto; max-height: 450px; width: 100%; object-fit: cover; margin: 0 auto 20px auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* === INTERACTION BUTTONS STYLE === */
        .reaction-btn { background:#222; border:1px solid #444; color:#fff; padding:10px 18px; margin:5px; border-radius:20px; cursor:pointer; font-size:14px; transition: 0.2s ease; }
        .reaction-btn:hover { background: #333; }
        
        /* === SUBSCRIBE style === */
        .subscribe-inline { margin-top: 50px; padding-top: 28px; border-top: 1px solid #444; text-align: center; }
        .subscribe-inline-heading { color: #ffffff; font-size: 17px; font-weight: bold; margin-bottom: 6px; }
        .subscribe-inline-text { color: #999; font-size: 14px; margin-bottom: 18px; }
        .subscribe-form { display: flex; gap: 10px; max-width: 380px; margin: 0 auto; }
        .subscribe-input { flex: 1; background-color: #1a1a1a !important; color: white !important; border: 1px solid #555 !important; border-radius: 6px !important; padding: 10px 14px !important; font-size: 14px; outline: none; }
        .subscribe-input::placeholder { color: #777; }
        .subscribe-input:focus { border-color: #ffffff !important; }
        .subscribe-btn { background-color: #ffffff; color: #000000; border: none; border-radius: 6px; padding: 10px 20px; font-weight: bold; cursor: pointer; font-size: 14px; white-space: nowrap; transition: background 0.2s; }
        .subscribe-btn:hover { background-color: #cccccc; }

        /* === RELATED POSTS === */
        .related-section { margin-top: 40px; padding-top: 30px; border-top: 2px solid #333; }
        .related-title { color: #ffffff; font-size: 20px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        @media (max-width: 600px) { .related-grid { grid-template-columns: 1fr; } }
        .related-card { background-color: #1a1a1a; border-radius: 12px; border-left: 5px solid #ffffff; padding: 16px; text-decoration: none; color: white; display: block; transition: transform 0.2s; }
        .related-card:hover { transform: translateY(-3px); }
        .related-card-badge { font-size: 11px; color: #888; margin-bottom: 6px; }
        .related-card-title { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-card-desc { font-size: 13px; color: #aaa; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .related-card-link { color: #ffffff; font-size: 13px; font-weight: bold; margin-top: 10px; display: inline-block; }
    </style>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/favicon.png">
</head>
<body>

    <div class="post-container" itemscope itemtype="http://schema.org/Article">
        <a href="/home.html" class="close-btn" title="Gara Dashboarditti Deebi'i">&times;</a>
        <h1 id="post-title" itemprop="headline">Loading...</h1>
        
        <div class="author-section">
          <a href="/about.html" title="Defera Dedecha ilaali">
            <img src="/images/Defera.jpg" alt="Defera" class="author-photo" loading="lazy" decoding="async" style="cursor:pointer;" />
          </a>
          <p class="date" id="post-date" style="margin:0;"></p>
        </div>

        <div id="post-image-container"></div>
        <div class="content" id="post-content" itemprop="articleBody"></div>

        <!-- Dynamic Action Toolbar (Reaction + Saved + Share + Comment BTNs) -->
        <div id="dynamic-action-toolbar"></div>

        <!-- Comment Section -->
        <div id="comment-section" style="display:none; margin-top:30px; padding-top:20px; border-top:1px solid #333;">
            <h3 style="color:#ffffff; font-size:16px; margin-bottom:16px;">💬 Yaada Kenname (<span id="comment-heading-count">0</span>)</h3>
            <div id="comment-list"></div>
            <div style="margin-top:16px;">
                <input id="comment-name" type="text" placeholder="Maqaa kee..." style="width:100%;background:#1a1a1a;border:1px solid #444;color:#fff;border-radius:8px;padding:10px;font-size:14px;margin-bottom:10px;box-sizing:border-box;outline:none;">
                <textarea id="comment-text" placeholder="Yaada kee barreessi..." style="width:100%;background:#1a1a1a;border:1px solid #444;color:#fff;border-radius:8px;padding:10px;font-size:14px;margin-bottom:10px;box-sizing:border-box;outline:none;resize:none;height:80px;"></textarea>
                <button onclick="submitComment()" style="background:#ffffff;color:#000;border:none;padding:10px 24px;border-radius:20px;font-weight:bold;cursor:pointer;font-size:14px;">Post Comment</button>
            </div>
        </div>

        <div class="subscribe-inline">
            <div class="subscribe-inline-heading">Discover more from RISE.D</div>
            <p class="subscribe-inline-text">Subscribe to get the latest posts sent to your email.</p>
            <form action="https://formspree.io/f/xbdbaolp" method="POST" class="subscribe-form">
                <input type="email" name="email" class="subscribe-input" placeholder="Type your email…" required>
                <button class="subscribe-btn" type="submit">Subscribe</button>
            </form>
        </div>

        <div class="related-section" id="related-section" style="display:none;">
            <div class="related-title">📖 Barruulee Biroo Dubbisi</div>
            <div class="related-grid" id="related-grid"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let slug = urlParams.get('slug'); 
        let category = urlParams.get('cat');

        if (!slug || !category) {
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            if (pathParts.length >= 2 && pathParts[0] !== 'post.html') {
                category = pathParts[0]; 
                slug = pathParts[1];     
            }
        }

        const catLabels = { motivation: '🔥 Motivation', stories: '📚 Seenaa', education: '🎓 Gorsa' };
        let itemID = category && slug ? (category + "-" + slug) : null;
        
        if (slug && category !== null) {
            fetch(`/data/${category}.json`)
                .then(res => res.json())
                .then(data => {
                    const post = data.items.find(item => item.slug === slug);
                    
                    if (post) {
                        document.title = post.title;
                        document.getElementById('post-title').innerText = post.title;
                        
                        const cleanText = (post.body || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
                        const shortDesc = cleanText.substring(0, 150) + "...";

                        // Meta description duraan ijaarame argachuu ykn haaraa uumuu
let metaDesc = document.querySelector('meta[name="description"]');
if (!metaDesc) {
    metaDesc = document.createElement('meta');
    metaDesc.setAttribute('name', 'description');
    document.head.appendChild(metaDesc);
}

// Yoo admin panel irratti guuttee jirta ta'e isa nuyi uumne (post.description) fudhata, yoo duwwaa ta'e immoo shortDesc (ofumaan kan cite) sana fayyadama.
const finalDesc = post.description && post.description.trim() !== "" ? post.description : shortDesc;

// Amma bakkoota hundatti ergi
metaDesc.setAttribute('content', finalDesc);
document.getElementById('meta-og-desc').setAttribute('content', finalDesc);

                        if (post.image) {
                            document.getElementById('meta-og-image').setAttribute('content', window.location.origin + post.image);
                        }

                        const canonical = document.createElement('link');
                        canonical.rel = 'canonical';
                        canonical.href = `https://risetoday.vercel.app/${category}/${slug}`;
                        document.head.appendChild(canonical);

                        const d = new Date(post.date);
                        const formatted = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                        
                        const wordCount = cleanText.split(' ').filter(w => w.length > 0).length;
                        const minutes = Math.ceil(wordCount / 200);
                        document.getElementById('post-date').innerHTML = `<a href="/about.html" style="color:#fff; text-decoration:none;"><strong>by Defera</strong></a> · ${formatted} · ${minutes} min read`;

                        let parsedBody = post.body.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                        parsedBody = parsedBody.replace(/\n/g, '<br>');
                        document.getElementById('post-content').innerHTML = parsedBody;

                        // Toolbar dynamically inject gochuu (Reaction + Saved + Share + Comment)
                        document.getElementById('dynamic-action-toolbar').innerHTML = `
                        <div style="margin:40px 0 20px 0; padding-top:20px; border-top:1px solid #333; text-align:center;">
                            <p style="color:#888; font-size:14px; margin-bottom:15px;">What do you think?</p>
                            <button onclick="handleReaction('like')" class="reaction-btn">👍 <span id="like-count">0</span></button>
                            <button onclick="handleReaction('love')" class="reaction-btn">❤️ <span id="love-count">0</span></button>
                            <button onclick="handleReaction('funny')" class="reaction-btn">😂 <span id="funny-count">0</span></button>
                            <button onclick="toggleSaveArticle()" id="save-btn" class="reaction-btn" style="font-weight:bold;">🔖 save</button>
                            <button onclick="sharePost('${post.title.replace(/'/g, "\\'")}')" class="reaction-btn">↗ Share</button>
                            <button onclick="toggleComments()" class="reaction-btn">💬 <span id="comment-count">0</span> Comments</button>
                        </div>`;

                        // Data duraan kufame fiduu
                        loadReactions();
                        updateSaveButtonVisual();
                        loadComments();

                        let readArticles = JSON.parse(localStorage.getItem('readArticlesList')) || [];
                        if (!readArticles.includes(itemID)) {
                            readArticles.push(itemID);
                            localStorage.setItem('readArticlesList', JSON.stringify(readArticles));
                        }

                        if (post.image) {
                            document.getElementById('post-image-container').innerHTML =
                                `<img src="${post.image}" alt="${post.title}" itemprop="image" loading="lazy" decoding="async" style="width:100%; height:auto; max-height:450px; object-fit:cover; border-radius:12px; display:block; margin:0 auto;">`;
                        }

                        loadRelatedPosts(data.items, slug, category);
                    } else {
                        document.getElementById('post-title').innerText = "Barruun hin argamne!";
                    }
                })
                .catch(() => { document.getElementById('post-title').innerText = "Dogoggorri uumameera!"; });
        }

        /* === REACTIONS LOGIC === */
        function handleReaction(type) {
            if (!itemID) return;
            let userReactedKey = `reacted_${itemID}`;
            
            // User-riin tokko al tokko qofa akka reaction laatu gochuuf
            if (localStorage.getItem(userReactedKey)) {
                alert("Duraan reaction laataniittu! 😊");
                return;
            }

            let key = `reaction_${itemID}_${type}`;
            let count = parseInt(localStorage.getItem(key)) || 0;
            count++;
            localStorage.setItem(key, count);
            localStorage.setItem(userReactedKey, type); // kan cuqaase galmeessi
            
            document.getElementById(`${type}-count`).innerText = count;
        }

        function loadReactions() {
            if (!itemID) return;
            ['like','love','funny'].forEach(type => {
                let count = localStorage.getItem(`reaction_${itemID}_${type}`) || 0;
                let el = document.getElementById(`${type}-count`);
                if (el) el.innerText = count;
            });
        }

        /* === SAVE TO LOCALSTORAGE LOGIC === */
        function toggleSaveArticle() {
            if (!itemID) return;
            let savedArticles = JSON.parse(localStorage.getItem('savedArticlesList')) || [];
            const currentUrl = window.location.pathname + window.location.search; 
            let title = document.getElementById('post-title')?.innerText || "Rise Today Article";
            
            const index = savedArticles.findIndex(a => a.id === itemID);
            if (index === -1) {
                savedArticles.push({ id: itemID, title: title, url: currentUrl });
                localStorage.setItem('savedArticlesList', JSON.stringify(savedArticles));
            } else {
                savedArticles.splice(index, 1);
                localStorage.setItem('savedArticlesList', JSON.stringify(savedArticles));
            }
            updateSaveButtonVisual();
        }

        function updateSaveButtonVisual() {
            if (!itemID) return;
            let savedArticles = JSON.parse(localStorage.getItem('savedArticlesList')) || [];
            const btn = document.getElementById('save-btn');
            if (!btn) return;
            
            const isSaved = savedArticles.some(a => a.id === itemID);
            if (isSaved) { 
                btn.innerHTML = "❤️ saved"; 
                btn.style.background = "#ffffff"; 
                btn.style.color = "#000000"; 
                btn.style.borderColor = "#ffffff";
            } else { 
                btn.innerHTML = "🔖 save"; 
                btn.style.background = "#222"; 
                btn.style.color = "#ffffff"; 
                btn.style.borderColor = "#444";
            }
        }

        /* === SHARE LOGIC === */
        function sharePost(title) {
            const shareUrl = window.location.href;
            if (navigator.share) {
                navigator.share({ title: title, url: shareUrl }).catch(() => {});
            } else {
                navigator.clipboard.writeText(shareUrl);
                alert('Liinkiin barruu kanaa copy ta\'eera! ↗');
            }
        }

        /* === COMMENTS WITH LOCALSTORAGE === */
        function toggleComments() {
            const section = document.getElementById('comment-section');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
            if(section.style.display === 'block') {
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function submitComment() {
            if (!itemID) return;
            const name = document.getElementById('comment-name').value.trim();
            const text = document.getElementById('comment-text').value.trim();
            if (!name || !text) {
                alert("Maqaa fi yaada kee guuti!");
                return;
            }

            let comments = JSON.parse(localStorage.getItem(`comments_${itemID}`)) || [];
            const newComment = { name, text, date: new Date().toISOString() };
            comments.push(newComment);
            localStorage.setItem(`comments_${itemID}`, JSON.stringify(comments));

            document.getElementById('comment-name').value = '';
            document.getElementById('comment-text').value = '';

            renderComments(comments);
        }

        function loadComments() {
            if (!itemID) return;
            let comments = JSON.parse(localStorage.getItem(`comments_${itemID}`)) || [];
            renderComments(comments);
        }

        function renderComments(comments) {
            const list = document.getElementById('comment-list');
            list.innerHTML = '';
            
            comments.forEach(c => {
                const div = document.createElement('div');
                div.style.cssText = 'background:#1a1a1a; border-radius:10px; padding:12px; margin-bottom:10px; text-align:left; border-left: 3px solid #ffffff;';
                div.innerHTML = `<strong style="color:#ffffff;">${c.name}</strong><p style="color:#ccc; margin:6px 0 0; font-size:14px;">${c.text}</p>`;
                list.appendChild(div);
            });

            document.getElementById('comment-count').innerText = comments.length;
            document.getElementById('comment-heading-count').innerText = comments.length;
        }

        /* === RELATED POSTS LOGIC === */
        function loadRelatedPosts(currentItems, currentSlug, currentCat) {
            const otherCats = ['motivation', 'stories', 'education'].filter(c => c !== currentCat);
            
            Promise.all(otherCats.map(cat =>
                fetch(`/data/${cat}.json`).then(r => r.json())
                    .then(d => (d.items || []).map(item => ({ ...item, cat })))
                    .catch(() => [])
            )).then(results => {
                const fromOthers = results.flat().sort(() => Math.random() - 0.5);
                const fromSame = currentItems
                    .map(item => ({ ...item, cat: currentCat }))
                    .filter(item => item.slug !== currentSlug)
                    .sort(() => Math.random() - 0.5);
                
                const related = [
                    ...fromSame.slice(0, 1),
                    ...fromOthers.slice(0, 2)
                ].sort(() => Math.random() - 0.5);
                
                displayRelated(related.slice(0, 3));
            });
          }

        function displayRelated(items) {
            if (items.length === 0) return;
            const grid = document.getElementById('related-grid');
            grid.innerHTML = '';
            items.forEach(item => {
                const desc = item.description || (item.body ? item.body.replace(/\*\*(.*?)\*\"/g, '$1').substring(0, 80) + '...' : '');
                const card = document.createElement('a');
                card.href = `/${item.cat}/${item.slug}`; 
                card.className = 'related-card';
                card.innerHTML = `
                    <div class="related-card-badge">${catLabels[item.cat] || ''}</div>
                    <div class="related-card-title">${item.title}</div>
                    <div class="related-card-desc">${desc}</div>
                    <span class="related-card-link">Dubbisi ➔</span>`;
                grid.appendChild(card);
            });
            document.getElementById('related-section').style.display = 'block';
        }
    </script>
</body>
</html>
