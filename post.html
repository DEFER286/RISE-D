<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise-d Barruu Guutuu</title>
        <style>
        body { background-color: #1A0D2E; color: white; font-family: Arial, sans-serif; padding: 20px; }
        .post-container { 
            max-width: 800px; 
            margin: auto; 
            position: relative; 
            padding-top: 40px; 
        }
        .close-btn {
            position: absolute;
            top: 0px;        
            right: 5px;      
            font-size: 35px; 
            color: #ffffff;  
            text-decoration: none;
            font-weight: bold;
            line-height: 1;
            transition: 0.2s;
        }
        .close-btn:hover {
            color: #ff9800;  
        }
                h1 { color: #ff9800; }
        .date { color: #888; font-size: 14px; }
        .content { font-size: 18px; line-height: 1.6; margin-top: 20px; }
        img { 
            display: block;
            max-width: 100%; 
            max-height: 400px;    
            width: auto;          
            margin: 0 auto 20px auto; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
    </style>
        
</head>
<body>
    <div class="post-container">
        <a href="home.html" class="close-btn" title="Gara Dashboarditti Deebi'i">&times;</a>
        <h1 id="post-title">Loading...</h1>
        <p class="date" id="post-date"></p>
        <div id="post-image-container"></div>
        <div class="content" id="post-content"></div>
    </div>

    <script>
        // URL irraa index fi category (motivation, stories, education) dubbisuu
        const urlParams = new URLSearchParams(window.location.search);
        const postIndex = urlParams.get('id');
        const category = urlParams.get('cat');

        if (postIndex !== null && category !== null) {
            // Faayila JSON sirrii ta'e irraa data fiduu
            let jsonFile = `data/${category}.json`;
            
            fetch(jsonFile)
                .then(res => res.json())
                .then(data => {
                    // Tarree keessaa post isa sirrii index isaatiin fudhachuu
                    const post = data.items[postIndex]; 
                    
                    if(post) {
                        document.title = post.title;
                        document.getElementById('post-title').innerText = post.title;
                        document.getElementById('post-date').innerText = new Date(post.date).toLocaleDateString();
                                            // Bakka buusi sarara 74:
                    document.getElementById('post-content').innerText = post.body;

                    // Itti dabali koodii kana:
                    let itemID = category + "-" + postIndex;
                    let emojiHTML = `
                    <div style="margin: 40px 0 20px 0; padding-top: 20px; border-top: 1px solid #333; text-align: center;">
                        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">What do you think?</p>
                        <button onclick="handleReaction('${itemID}', 'like')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">👍 <span id="like-${itemID}">0</span></button>
                        <button onclick="handleReaction('${itemID}', 'love')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">❤️ <span id="love-${itemID}">0</span></button>
                        <button onclick="handleReaction('${itemID}', 'funny')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">😂 <span id="funny-${itemID}">0</span></button>
                    </div>`;
                    document.getElementById('post-content').innerHTML += emojiHTML;
                    loadReactions(itemID);                      
                        
                        if(post.image) {
                            document.getElementById('post-image-container').innerHTML = `<img src="${post.image}" alt="${post.title}">`;
                        }
                    } else {
                        document.getElementById('post-title').innerText = "Barruun hin argamne!";
                    }
                })
                .catch(err => {
                    document.getElementById('post-title').innerText = "Dogoggorri uumameera!";
                });
        }
            function handleReaction(id, type) {
        let key = 'reaction_' + id + '_' + type;
        let count = parseInt(localStorage.getItem(key)) || 0;
        count++;
        localStorage.setItem(key, count);
        document.getElementById(type + '-' + id).innerText = count;
    }

    function loadReactions(id) {
        ['like', 'love', 'funny'].forEach(type => {
            let count = localStorage.getItem('reaction_' + id + '_' + type) || 0;
            let el = document.getElementById(type + '-' + id);
            if(el) el.innerText = count;
        });
    }
        
    </script>
</body>
</html>
