<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISE-D | Gorsa Barnootaa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1A0D2E;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .main-container {
            max-width: 800px;
            margin: 40px auto;
        }
        h1.page-title {
            color: #FF9800;
            text-align: center;
            border-bottom: 2px solid #FF9800;
            padding-bottom: 10px;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .article-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 152, 0, 0.2);
            margin-bottom: 40px;
            scroll-margin-top: 40px;
            transition: all 0.3s ease;
        }
        .article-card:target {
            border-color: #FF9800;
            background: rgba(255, 152, 0, 0.1);
        }
        .article-title {
            color: #FF9800;
            margin-top: 0;
        }
        .article-date {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .article-body {
            line-height: 1.8;
            color: #ddd;
            white-space: pre-wrap;
            margin-bottom: 30px;
        }
        .back-btn-container {
            text-align: left;
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #FF9800;
            border-radius: 30px;
            color: #FF9800;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            background: rgba(255, 152, 0, 0.05);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #FF9800;
            color: #1A0D2E;
        }
        /* Iddoo Disqus */
        .comment-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="back-btn-container">
            <a href="home.html" class="back-btn">← Gara Home Deebi'i</a>
        </div>
        
        <h1 class="page-title">🎓 Gorsa Barnoota</h1>
        
        <div id="all-education-articles">
            <!-- Barruuleen hundi as keessatti ijaarama -->
        </div>
    </div>

<script>
fetch('data/education.json')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('all-education-articles');
        container.innerHTML = '';

        // 1. Barruulee ijaaruu fi iddoo Utterances fi Emoji qopheessuu
        data.items.forEach(item => {
            // Mallattoolee akka ?, ', !, fi kkf qulqulleessuuf (Emoji'n akka hojjetuuf)
            const itemID = item.title.replace(/[^a-zA-Z0-9\s]/g, '').replace(/\s+/g, '-').toLowerCase();

            // Suuraan qubee xiqqaan ykn qubee guddaan yoo ka'ame illee akka dubbisuuf
let imgHTML = '';
let imageSrc = item.photo || item.Photo;

if (imageSrc) {
    imgHTML = `<div class="article-image" style="margin-bottom: 20px; text-align: center;">
                <img src="${imageSrc}" alt="${item.title}" style="max-width: 100%; max-height: 400px; border-radius: 8px; height: auto; object-fit: cover;">
               </div>`;
}


            container.innerHTML += `
                <div class="article-card" id="${itemID}">
                    <h2 class="article-title">${item.title}</h2>
                    <div class="article-date">${item.date ? new Date(item.date).toLocaleDateString() : ''}</div>
                    
                    ${imgHTML} <!-- Suuraan asitti dhalata -->

                    <div class="article-body">${item.body || ''}</div>

                    <!-- Emoji Reactions Box -->
                    <div class="reaction-box" style="margin: 25px 0; padding: 10px; border-top: 1px solid #333; text-align: center;">
                        <p style="color: #888; font-size: 14px; margin-bottom: 10px;">What do you think?</p>
                        <button onclick="handleReaction('${itemID}', 'like')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">👍 <span id="like-${itemID}">0</span></button>
                        <button onclick="handleReaction('${itemID}', 'love')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">❤️ <span id="love-${itemID}">0</span></button>
                        <button onclick="handleReaction('${itemID}', 'funny')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">😆 <span id="funny-${itemID}">0</span></button>
                    </div>

                    <!-- Saanduqa Utterances (Comments) -->
                    <div class="comment-box" id="utterances-${itemID}"></div>
                </div>
            `;
        });

        // 2. Barruu hunda jalatti Utterances fe'uu
        data.items.forEach(item => {
            const itemID = item.title.replace(/[^a-zA-Z0-9\s]/g, '').replace(/\s+/g, '-').toLowerCase();

            const script = document.createElement('script');
            script.src = 'https://utteranc.es/client.js';
            script.setAttribute('repo', 'DEFER286/RISE-D');
            script.setAttribute('issue-term', itemID);
            script.setAttribute('theme', 'github-dark');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;

            const targetCommentBox = document.getElementById(`utterances-${itemID}`);
            if (targetCommentBox) {
                targetCommentBox.appendChild(script);
            }

            // Emoji kuusaa keessaa fiduu
            loadReactions(itemID);
        });

        // C. Koodii Auto-Scroll
        if (window.location.hash) {
            const hashValue = decodeURIComponent(window.location.hash.substring(1)).toLowerCase().trim();
            setTimeout(() => {
                const targetElement = document.getElementById(hashValue);
                if (targetElement) {
                    targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 1000);
        }
    })
    .catch(error => console.error('Rakkoon uumameera:', error));

// Emojii reaction hordofuuf (Backticks sirraa'eera)
function handleReaction(itemID, type) {
    let count = parseInt(localStorage.getItem(`${itemID}-${type}`) || 0);
    count++;
    localStorage.setItem(`${itemID}-${type}`, count);
    
    const element = document.getElementById(`${type}-${itemID}`);
    if (element) element.innerText = count;
}

function loadReactions(itemID) {
    ['like', 'love', 'funny'].forEach(type => {
        let count = parseInt(localStorage.getItem(`${itemID}-${type}`) || 0);
        const element = document.getElementById(`${type}-${itemID}`);
        if (element) element.innerText = count;
    });
}
</script>
   
</body>
</html>
