<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISE-D | Gorsa Barnootaa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1A0D2E;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .main-container {
            max-width: 800px;
            margin: 40px auto;
        }
        h1.page-title {
            color: #FF9800;
            text-align: center;
            border-bottom: 2px solid #FF9800;
            padding-bottom: 10px;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .article-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 152, 0, 0.2);
            margin-bottom: 40px;
            scroll-margin-top: 40px;
            transition: all 0.3s ease;
        }
        .article-card:target {
            border-color: #FF9800;
            background: rgba(255, 152, 0, 0.1);
        }
        .article-title {
            color: #FF9800;
            margin-top: 0;
        }
        .article-date {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .article-body {
            line-height: 1.8;
            color: #ddd;
            white-space: pre-wrap;
            margin-bottom: 30px;
        }
        .back-btn-container {
            text-align: left;
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #FF9800;
            border-radius: 30px;
            color: #FF9800;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            background: rgba(255, 152, 0, 0.05);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #FF9800;
            color: #1A0D2E;
        }
        /* Iddoo Disqus */
        .comment-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="back-btn-container">
            <a href="home.html" class="back-btn">← Gara Home Deebi'i</a>
        </div>
        
        <h1 class="page-title">🎓 Gorsa Barnoota</h1>
        
        <div id="all-education-articles">
            <!-- Barruuleen hundi as keessatti ijaarama -->
        </div>
    </div>

        <script>
        fetch('data/education.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('all-education-articles');
                container.innerHTML = '';

                if (data.items && data.items.length > 0) {
                    const allItems = data.items.reverse();
                    
                    allItems.forEach(item => {
                        const itemID = item.title.replace(/\s+/g, '-').toLowerCase();
                        
                        // Barruu fi Disqus waliin ijaaruu
                        container.innerHTML += `
                            <div class="article-card" id="${itemID}">
                                <h2 class="article-title">${item.title}</h2>
                                <div class="article-date">${item.date ? new Date(item.date).toLocaleDateString() : ''}</div>
                                <div class="article-body">${item.body || ''}</div>
                                
                                <div class="comment-box">
                                    <div id="disqus_thread"></div>
                                </div>
                            </div>
                        `;
                    });

                    // Disqus jalqabsiisuu
                    var disqus_config = function () {
                        this.page.url = window.location.href;
                        this.page.identifier = 'education-all';
                    };
                    (function() {
                        var d = document, s = d.createElement('script');
                        s.src = 'https://rise-d.disqus.com/embed.js';
                        s.setAttribute('data-timestamp', +new Date());
                        (d.head || d.body).appendChild(s);
                    })();

                    // Scroll gochuu
                    if (window.location.hash) {
                        const target = document.querySelector(window.location.hash);
                        if (target) target.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
    </script>

</body>
</html>
