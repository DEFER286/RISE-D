<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="canonical" href="https://risetoday.vercel.app/education.html" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet"></noscript>
    <style>
        /* === LIGHT MODE BY DEFAULT === */
        body { 
            margin: 0; 
            padding-top: 60px; 
            background-color: #ffffff; 
            color: #333333; 
            font-family: 'Poppins', sans-serif; 
            transition: background-color 0.3s, color 0.3s;
        }
        
        .menu-trigger-btn { 
            cursor: pointer; 
            position: fixed; 
            top: 12px; 
            left: 12px; 
            z-index: 10000; 
            background: rgba(255,255,255,0.85); 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 8px 12px; 
            backdrop-filter: blur(4px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        #side-menu { display: none; background-color: #0D0D0D; position: fixed; top: 0; left: 0; width: 280px; height: 100%; z-index: 9999; padding-top: 60px; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
        #close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; color: white; cursor: pointer; }
        #side-menu a { display: block; color: white; text-decoration: none; font-size: 18px; padding: 16px 25px; border-bottom: 1px solid #2a2a2a; }
        #side-menu a.active { font-weight: bold; background-color: rgba(255, 255, 255, 0.1); }

        .hero {
            background-image: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), url('/images/hero-bg.webp');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            border-radius: 0 0 24px 24px; padding: 40px 20px 30px; text-align: center;
            min-height: 100px;
        }

        .unified-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: auto; gap: 14px; margin-top: 10px; padding: 0 4px;
        }
        @media (min-width: 768px) {
            .unified-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
        }

        .mini-card { background-color: #f9f9f9; border: 1px solid #eeeeee; border-radius: 12px; overflow: hidden; transition: transform 0.2s; text-decoration: none; color: inherit; display: flex; flex-direction: column; height: 100%; }
        .mini-card:hover { transform: translateY(-3px); }
        
        .mini-card-img { width: 100%; height: auto; aspect-ratio: 16 / 9; object-fit: cover; display: block; flex-shrink: 0; }
        .mini-card-placeholder { display: flex; align-items: center; justify-content: center; font-size: 36px; background: #e1e1e1; color: #666; width: 100%; aspect-ratio: 16 / 9; flex-shrink: 0; }
        
        .mini-card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .mini-card-title { color: #000000; font-size: 14px; font-weight: bold; line-height: 1.4; margin: 0 0 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-height: 38px; }
        .mini-card-desc { color: #666666; font-size: 12px; line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-height: 34px; }
        .mini-card-link { font-size: 12px; font-weight: bold; margin-top: auto; color: #000000; }
        .cat-badge { display: inline-block; font-size: 10px; font-weight: bold; border-radius: 50px; padding: 2px 8px; margin-bottom: 6px; width: fit-content; background: #e8e8e8; color: #333; }


        .loading-msg { text-align: center; color: #888; padding: 40px 0; font-size: 15px; }

        /* === 2. DARK MODE STYLES === */
        body.dark-mode { background: #000000 !important; background-attachment: fixed !important; color: #b3b3b3; }
        body.dark-mode .menu-trigger-btn { background: rgba(0,0,0,0.5); border-color: #333; }
        body.dark-mode .hero { background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('/images/hero-bg.webp'); }
        body.dark-mode .mini-card { background-color: #1a1a1a; border-color: transparent; }
        body.dark-mode .mini-card-placeholder { background: #2a2a2a; color: #aaa; }
        body.dark-mode .mini-card-title { color: #ffffff; }
        body.dark-mode .mini-card-desc { color: #bbbbbb; }
        body.dark-mode .mini-card-link { color: #ffffff; }
        body.dark-mode .cat-badge { background: rgba(255,255,255,0.1); color: #ffffff; }
    </style>
</head>
<body>
    <div id="menu-btn" class="menu-trigger-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" id="menu-svg-icon"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>
    
    <div id="side-menu">
        <div id="close-btn">✕</div>
        <a href="/home.html">Home</a>
        <a href="/motivation.html">🔥 Motivation</a>
        <a href="/stories.html">📚 Seenaa</a>
        <a href="/education.html" class="active">🎓 Gorsa</a>
        <a href="/saved.html">🔖 saved </a>
    </div>

    <div class="hero">
        <h1 style="color:inherit; font-size:2em; margin:0 0 10px; font-weight:800;">🎓 Gorsa</h1>
        <p style="color:inherit; opacity: 0.8; margin:0;">Gorsa barnootaa fi jireenyaa barbaachisaa.</p>
    </div>

    <div style="padding:16px;">
        <div class="unified-grid" id="unified-grid">
            <p class="loading-msg" id="loading-msg">Fe'amaa jira...</p>
        </div>
    </div>

    <script>
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const menuSvg = document.getElementById('menu-svg-icon');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                if (menuSvg) menuSvg.style.stroke = "#ffffff";
            } else {
                document.body.classList.remove('dark-mode');
                if (menuSvg) menuSvg.style.stroke = "#000000";
            }
        }
        initTheme();

        document.getElementById('menu-btn').addEventListener('click', () => { document.getElementById('side-menu').style.display = 'block'; });
        document.getElementById('close-btn').addEventListener('click', () => { document.getElementById('side-menu').style.display = 'none'; });

        function buildCard(item) {
            const raw = item.description || item.body || '';
            const plain = raw.replace(/<[^>]*>/g, ' ').replace(/#{1,6}\s*/g, '').replace(/\*{1,2}([^*]*)\*{1,2}/g, '$1').replace(/[-•*]\s+/g, ' ').replace(/\\n/g, ' ').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
            const desc = plain.substring(0, 80) + (plain.length > 80 ? '...' : '');
            const imgHTML = item.image
                ? `<img src="${item.image}" class="mini-card-img" alt="${item.title}" loading="lazy" width="400" height="225" decoding="async" onerror="this.outerHTML='<div class=mini-card-placeholder>🎓</div>'">`
                : `<div class="mini-card-placeholder">🎓</div>`;
            return `
                <a href="/education/${item.slug}" class="mini-card">
                    ${imgHTML}
                    <div class="mini-card-body">
                        <span class="cat-badge">🎓 Gorsa</span>
                        <h3 class="mini-card-title">${item.title}</h3>
                        <p class="mini-card-desc">${desc}</p>
                        <span class="mini-card-link">Dubbisi ➔</span>
                    </div>
                </a>`;
        }

        fetch('/data/education.json')
            .then(r => r.json())
            .then(data => {
                const grid = document.getElementById('unified-grid');
                document.getElementById('loading-msg')?.remove();
                const now = new Date();
                const posts = (data.items || [])
                    .filter(item => new Date(item.date || item.Guyyaa || 0) <= now)
                    .sort((a, b) => new Date(b.date || b.Guyyaa || 0) - new Date(a.date || a.Guyyaa || 0));
                if (posts.length === 0) {
                    grid.innerHTML = '<p class="loading-msg">Post hin jiru.</p>';
                } else {
                    grid.innerHTML = posts.map(buildCard).join('');
                }
            })
            .catch(() => {
                document.getElementById('unified-grid').innerHTML = '<p class="loading-msg">Rakkoo uumame. Irra deebi\'ii yaali.</p>';
            });
    </script>
</body>
</html>
