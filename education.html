<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISE-D | Gorsa Barnootaa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1A0D2E;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .main-container {
            max-width: 800px;
            margin: 40px auto;
        }
        h1.page-title {
            color: #FF9800;
            text-align: center;
            border-bottom: 2px solid #FF9800;
            padding-bottom: 10px;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .article-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 152, 0, 0.2);
            margin-bottom: 40px;
            scroll-margin-top: 40px;
            transition: all 0.3s ease;
        }
        .article-card:target {
            border-color: #FF9800;
            background: rgba(255, 152, 0, 0.1);
        }
        .article-title {
            color: #FF9800;
            margin-top: 0;
        }
        .article-date {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .article-body {
            line-height: 1.8;
            color: #ddd;
            white-space: pre-wrap;
        }
        /* Qabduu (Button) Gara Home Deebi'i jedhu bifa saanduqaatiin */
        .back-btn-container {
            text-align: left;
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #FF9800;
            border-radius: 30px;
            color: #FF9800;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            background: rgba(255, 152, 0, 0.05);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #FF9800;
            color: #1A0D2E;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 2. Gara Home Deebi'i jedhu bifa saanduqaatiin asitti dhufeera -->
        <div class="back-btn-container">
            <a href="home.html" class="back-btn">← Gara Home Deebi'i</a>
        </div>
        
        <!-- 1. GORSA BARNOOTA HUNDA osoo hin taane GORSA BARNOOTA qofa jedha -->
        <h1 class="page-title">🎓 Gorsa Barnoota</h1>
        
        <div id="all-education-articles">
            <!-- Barruuleen hundi as keessatti ijaarama -->
        </div>
    </div>

    <script>
        fetch('data/education.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('all-education-articles');
                container.innerHTML = '';

                if (data.items && data.items.length > 0) {
                    const allItems = data.items.reverse();
                    
                    allItems.forEach(item => {
                        const itemID = item.title.replace(/\s+/g, '-').toLowerCase();
                        
                        container.innerHTML += `
                            <div class="article-card" id="${itemID}">
                                <h2 class="article-title">${item.title}</h2>
                                <div class="article-date">${item.date ? new Date(item.date).toLocaleDateString() : ''}</div>
                                <div class="article-body">${item.body || ''}</div>
                            </div>
                        `;
                    });

                    if (window.location.hash) {
                        const targetElement = document.querySelector(window.location.hash);
                        if (targetElement) {
                            setTimeout(() => {
                                targetElement.scrollIntoView({ behavior: 'smooth' });
                            }, 300);
                        }
                    }
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #aaa;">Ammaaf barruun gorsa barnootaa hin jiru.</p>';
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('all-education-articles').innerHTML = '<p style="text-align: center; color: #aaa;">Rakkon uumameera.</p>';
            });
    </script>
</body>
</html>
