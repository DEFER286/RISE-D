<div style="max-width: 600px; margin: 0 auto; padding: 20px; margin-top: 20px;">

    <!-- Qabiyyee fayiilii stories koodii hafe hunda... -->
    
        <p style="text-align: center; color: #ddd; margin-bottom: 40px;">Seenaawwan gaggabaaboo barsiisaa ta'an.</p>

        <!-- Barruuleen CMS irraa asitti ofumaan seenu -->

   <!-- Koodii JavaScript Menu Hojjechiisuuf -->
    <script>
  // 1. Menu hojjechiisuuf (Isa duraa)
  const menuBtn = document.getElementById('menu-btn');
  const sideMenu = document.getElementById('side-menu');
  menuBtn.addEventListener('click', () => {
    sideMenu.style.display = sideMenu.style.display === 'none' ? 'block' : 'none';
  });

  const homeBtn = document.getElementById('home-dropdown-btn');
  const homeSubMenu = document.getElementById('home-sub-menu');
  homeBtn.addEventListener('click', (e) => {
    e.preventDefault();
    homeSubMenu.style.display = homeSubMenu.style.display === 'none' ? 'block' : 'none';
    homeBtn.innerHTML = homeSubMenu.style.display === 'block' ? 'Home ▲' : 'Home ▼';
  });

  // 2. Barruulee CMS irraa "Fetch" gochuuf (Koodii Haaraa)
  fetch('data/stories.json')
    .then(response => response.json())
        .then(data => {
            const container = document.getElementById('stories-container');
                    data.items.forEach(story => {
            const storyDiv = document.createElement('div');
            storyDiv.innerHTML = `
                <div id="${story.title.split(' ')[0]}" style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 12px; margin-bottom: 25px; overflow: hidden;">
                    ${story.image ? `<img src="${story.image}" alt="${story.title}" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; display: block;">` : ''}
                    <h3 style="color: #00BCD4; margin-top: 0;">${story.title}</h3>
                    <p style="color: #ddd; white-space: pre-wrap; line-height: 1.6;">${story.body}</p>
                </div>
            `;
                            
                container.appendChild(storyDiv);
            });

            // GADI SIQUU (SCROLL) OFUMAAN HAALA KANAAN SEENAA
            if (window.location.hash) {
                setTimeout(() => {
                    const targetElement = document.querySelector(window.location.hash);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 100);
            }
        })
        
    .catch(error => console.log('Barruun hin argamne:', error));
        </script>
</body>
