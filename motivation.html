<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivational Speech - RISE.D</title>
</head>
<body style="background: linear-gradient(135deg, #110A1C, #1A0D2E, #0A1C2A); background-attachment: fixed; margin: 0; padding: 0; font-family: sans-serif; color: #ffffff;">

    <!-- Menu Button ☰ -->
    <nav style="position: relative; z-index: 9999;">
        <div id="menu-btn" style="cursor: pointer; font-size: 24px; color: #ff9800; padding: 15px;">☰</div>
        
        <!-- Menu Gadi-ba'u -->
        <div id="side-menu" style="display: none; background-color: #1A0D2E; position: fixed; top: 50px; left: 0; width: 100%; text-align: center; padding: 20px; overflow-y: auto; max-height: 80vh;">
            <a href="index.html" style="display: block; color: white; padding: 10px; text-decoration: none; font-size: 18px;">Portfolio</a>
            <a href="about.html" style="display: block; color: white; padding: 10px; text-decoration: none; font-size: 18px;">About</a>
            
            <div style="margin: 10px 0;">
                <a href="#" id="home-dropdown-btn" style="display: block; color: #ff9800; padding: 10px; text-decoration: none; font-size: 18px; font-weight: bold;">Home ▼</a>
                <div id="home-sub-menu" style="display: none; background-color: #2A1D3E; padding: 10px; border-radius: 8px; margin: 5px 20%; border-left: 3px solid #ff9800;">
                    <a href="motivation.html" style="display: block; color: white; padding: 8px; text-decoration: none; font-size: 15px;">1. Motivational Speech</a>
                    <a href="stories.html" style="display: block; color: white; padding: 8px; text-decoration: none; font-size: 15px; margin-top: 5px;">2. Instructive Stories</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Qabiyyee Fuulachaa (Content) -->
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; margin-top: 20px;">    
        <!-- ...koodii nav gubbaa jiru... -->
</nav>

<!-- Qabiyyee Fuulachaa (Content) -->
<div style="max-width: 600px; margin: 0 auto; padding: 20px; margin-top: 20px;">

    <!-- LIINKII GARA HOME DEEBISU KANA ASITTI GALCHI -->
    <div style="text-align: left; margin-bottom: 20px;">
        <a href="home.html" style="color: #ff9800; text-decoration: none; font-size: 16px; font-weight: bold; background-color: #2A1D3E; padding: 8px 15px; border-radius: 20px; border: 1px solid #ff9800;">
            ⬅ Gara Home Deebi'i
        </a>
    </div>

    <h1 style="color: #ff9800; text-align: center; font-size: 2.2em;">🔥 Motivational Speech</h1>
    <!-- ...koodii kaan hunda akkuma jirutti dhiisi... -->
    
        <p style="text-align: center; color: #ddd; margin-bottom: 40px;">Sagalee onnachiisoo fi jechoottan jajjabeessoo asitti argattu.</p>

        <!-- Barruuleen Motivation CMS irraa asitti ofumaan seenu -->
<div id="motivation-container"></div>
    

   </div>

    <!-- Koodii JavaScript Menu Hojjechiisuuf -->
    <script>
  // 1. Menu hojjechiisuuf
  const menuBtn = document.getElementById('menu-btn');
  const sideMenu = document.getElementById('side-menu');
  menuBtn.addEventListener('click', () => {
    sideMenu.style.display = sideMenu.style.display === 'none' ? 'block' : 'none';
  });

  const homeBtn = document.getElementById('home-dropdown-btn');
  const homeSubMenu = document.getElementById('home-sub-menu');
  homeBtn.addEventListener('click', (e) => {
    e.preventDefault();
    homeSubMenu.style.display = homeSubMenu.style.display === 'none' ? 'block' : 'none';
    homeBtn.innerHTML = homeSubMenu.style.display === 'block' ? 'Home ▲' : 'Home ▼';
  });

  // 2. Barruulee Motivation JSON keessaa harkisee fiduu
  fetch('data/motivation.json')
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('motivation-container');
      data.items.forEach(speech => {
        const speechDiv = document.createElement('div');
                speechDiv.innerHTML = `
            <div id="${speech.slug}" style="background: rgba(255, 255, 255, 0.05); padding: 20px; margin-bottom: 25px; border-radius: 12px; scroll-margin-top: 100px;">
                <h3 style="color: #ff9800;">${speech.title}</h3>
                <p style="color: #ddd; white-space: pre-wrap;">${speech.body}</p>
            </div>
        `;
                                              
        `;
        container.appendChild(speechDiv);
      });
    })
    .catch(error => console.log('Barruun Motivation hin argamne:', error));
                </script>
        
</body>
</hml>
