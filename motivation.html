<div style="max-width: 600px; margin: 0 auto; padding: 20px; margin-top: 20px;">

    <!-- LIINKII GARA HOME DEEBISU KANA ASITTI GALCHI -->
    <div style="text-align: left; margin-bottom: 20px;">
        <a href="home.html" style="color: #ff9800; text-decoration: none; font-size: 16px; font-weight: bold; background-color: #2A1D3E; padding: 8px 15px; border-radius: 20px; border: 1px solid #ff9800;">

    <h1 style="color: #ff9800; text-align: center; font-size: 2.2em;">🔥 Motivational Speech</h1>
    <!-- ...koodii kaan hunda akkuma jirutti dhiisi... -->
    
        <p style="text-align: center; color: #ddd; margin-bottom: 40px;">Sagalee onnachiisoo fi jechoottan jajjabeessoo asitti argattu.</p>

        <!-- Barruuleen Motivation CMS irraa asitti ofumaan seenu -->
    <div id="motivation-container"></div>

    </div>


    <!-- Koodii JavaScript Menu Hojjechiisuuf -->
    <script>
  // 1. Menu hojjechiisuuf
  const menuBtn = document.getElementById('menu-btn');
  const sideMenu = document.getElementById('side-menu');
  menuBtn.addEventListener('click', () => {
    sideMenu.style.display = sideMenu.style.display === 'none' ? 'block' : 'none';
  });

  const homeBtn = document.getElementById('home-dropdown-btn');
  const homeSubMenu = document.getElementById('home-sub-menu');
  homeBtn.addEventListener('click', (e) => {
    e.preventDefault();
    homeSubMenu.style.display = homeSubMenu.style.display === 'none' ? 'block' : 'none';
    homeBtn.innerHTML = homeSubMenu.style.display === 'block' ? 'Home ▲' : 'Home ▼';
  });

    // 2. Barruulee Motivation JSON keessaa harkisee fiduu fi Utterances dabalachuu
    fetch('data/motivation.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('motivation-container');
            container.innerHTML = '';
            
            // A. Barruulee ijaaruu fi iddoo Utterances + Emoji qopheessuu
            data.items.forEach((speech) => {
                const itemID = speech.title.replace(/\s+/g, '-').toLowerCase();
                
                let imageHtml = '';
                if (speech.image) {
                    imageHtml = `<img src="${speech.image}" alt="${speech.title}" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 15px;">`;
                }

                container.innerHTML += `
                    <div class="article-card" id="${itemID}" style="background: rgba(255, 255, 255, 0.05); padding: 20px; margin-bottom: 30px; border-radius: 8px;">
                        ${imageHtml}
                        <h3 style="color: #00BCD4; margin-top: 0;">${speech.title}</h3>
                        <div style="color: #ddd; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px;">${speech.body}</div>
                        
                        <!-- Emoji Reactions Box -->
                        <div class="reaction-box" style="margin: 25px 0; padding: 10px; border-top: 1px solid #333; text-align: center;">
                            <p style="color: #888; font-size: 14px; margin-bottom: 10px;">What do you think?</p>
                            <button onclick="handleReaction('${itemID}', 'like')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">👍 <span id="like-${itemID}">0</span></button>
                            <button onclick="handleReaction('${itemID}', 'love')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">❤️ <span id="love-${itemID}">0</span></button>
                            <button onclick="handleReaction('${itemID}', 'funny')" style="background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px;">😆 <span id="funny-${itemID}">0</span></button>
                        </div>

                        <!-- Saanduqa Utterances (Comments) -->
                        <div class="comment-box" id="utterances-${itemID}"></div>
                    </div>
                `;
            });

            // B. Barruu hunda jalatti Utterances fe'uu
            data.items.forEach((speech) => {
                const itemID = speech.title.replace(/\s+/g, '-').toLowerCase();
                
                const script = document.createElement('script');
                script.src = 'https://utteranc.es/client.js';
                script.setAttribute('repo', 'DEFER286/RISE-D'); 
                script.setAttribute('issue-term', itemID); 
                script.setAttribute('theme', 'github-dark'); 
                script.setAttribute('crossorigin', 'anonymous');
                script.async = true;

                document.getElementById('utterances-' + itemID).appendChild(script);
                
                // Emoji kuusaa keessaa fiduu
                loadReactions(itemID);
            });
            // C. KOODII AUTO-SCROLL (Amguddaan fi Kan Hin Maqne)
            if (window.location.hash) {
                const hashValue = decodeURIComponent(window.location.hash.substring(1)).toLowerCase().trim();
                
                setTimeout(() => {
                    const allCards = document.querySelectorAll('.article-card');
                    let targetElement = null;

                    allCards.forEach(card => {
                        if (card.id.includes(hashValue) || hashValue.includes(card.id)) {
                            targetElement = card;
                        }
                    });

                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else {
                        const allTitles = document.querySelectorAll('h3');
                        allTitles.forEach(title => {
                            if (title.innerText.toLowerCase().includes(hashValue)) {
                                title.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        });
                    }
                }, 1000); 
            }

        })
        .catch(error => console.log('Barruun Motivation hin argamne:', error));

    // Emojii reaction function koodii
    function handleReaction(itemID, type) {
        let count = parseInt(localStorage.getItem(`${itemID}-${type}`) || 0);
        count++;
        localStorage.setItem(`${itemID}-${type}`, count);
        document.getElementById(`${type}-${itemID}`).innerText = count;
    }

    function loadReactions(itemID) {
        ['like', 'love', 'funny'].forEach(type => {
            let count = localStorage.getItem(`${itemID}-${type}`) || 0;
            const element = document.getElementById(`${type}-${itemID}`);
            if (element) element.innerText = count;
        });
    }

            
                </script>
